<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>部屋予約システム</title>

<style>
body {
    font-family: sans-serif;
    background: #f4f4f4;
    margin: 0;
}

.container {
    width: 90%;
    max-width: 800px;
    margin: 30px auto;
}

h1 {
    text-align: center;
}

/* 状態表示 */
.status {
    color: white;
    padding: 20px;
    text-align: center;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 20px;
}

.free {
    background: green;
}

.busy {
    background: red;
}

/* カード */
.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* 入力 */
input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

/* ボタン */
button {
    width: 100%;
    padding: 12px;
    background: green;
    color: white;
    border: none;
    border-radius: 8px;
}

.delete-btn {
    background: red;
    margin-top: 5px;
}

.reservation {
    border-bottom: 1px solid #ccc;
    padding: 10px 0;
}
</style>

</head>

<body>

<div class="container">

<h1>部屋予約</h1>

<!-- 状態表示 -->
{% if reservations|length == 0 %}
<div class="status free">空いています</div>
{% else %}
<div class="status busy">予約あり</div>
{% endif %}

<!-- ==================== -->
<!-- 検索フォーム -->
<!-- ==================== -->
<div class="card">
<h2>日付検索</h2>

<form method="GET" action="/">
    <input type="date" name="date" value="{{ search_date }}">
    <button type="submit">検索</button>
</form>

</div>

<!-- ==================== -->
<!-- 予約フォーム -->
<!-- ==================== -->
<div class="card">
<h2>予約する</h2>

<form action="/add" method="POST">

    <label>名前</label>
    <input type="text" name="name" required>

    <label>日付</label>
    <input type="date" name="date" required>

    <label>時間</label>
    <select name="slot">
        {% for s in slots %}
        <option value="{{ s }}">{{ s }}</option>
        {% endfor %}
    </select>

    <button type="submit">予約する</button>

</form>

</div>

<!-- ==================== -->
<!-- 予約一覧 -->
<!-- ==================== -->
<div class="card">
<h2>予約一覧</h2>

{% if reservations|length == 0 %}
<p>該当する予約はありません</p>
{% endif %}

{% for r in reservations %}
<div class="reservation">
    <div><b>{{ r.date }}</b> / {{ r.slot }}</div>
    <div>{{ r.name }}</div>

    <form action="/delete" method="POST">
        <input type="hidden" name="id" value="{{ r.id }}">
        <button class="delete-btn">削除</button>
    </form>
</div>
{% endfor %}

</div>

</div>

</body>
</html>
