<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ログイン</title>

<style>

body{
    font-family:"Yu Gothic",sans-serif;
    background:#f5f5f5;
    max-width:600px;
    margin:auto;
    padding:40px;
}

.card{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 5px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:10px;
    box-sizing:border-box;
}

button{
    background:#28a745;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}

h1{
    text-align:center;
}

</style>

</head>
<body>

<div class="card">

    <h1>学校メールログイン</h1>

    <form action="/save_global_notice" method="post">

        <input
            type="email"
            name="email"
            placeholder="学校メールアドレス"
            required>

        <br><br>

        <button type="submit">
            ログイン
        </button>

    </form>

</div>

</body>
</html>
